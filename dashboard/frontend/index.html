<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c7ce" />
    <meta name="description" content="Debi Marlene Discord Bot Dashboard" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="preload" href="/fonts/Paperlogy-4Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/Paperlogy-7Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/MemomentKkukkukk.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/YPairingFont-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <title>Debi Marlene Dashboard</title>
    <script>
      // /portfolio/* 라우트는 AdSense Auto Ads 차단 — 면접관이 보는 페이지에 광고 노출 금지.
      // adsbygoogle 스크립트가 로드되기 전에 pauseAdRequests=1 을 박아둬야 첫 광고 요청 자체를 막음.
      (function () {
        if (window.location.pathname.indexOf('/portfolio/') === 0) {
          window.adsbygoogle = window.adsbygoogle || [];
          window.adsbygoogle.pauseAdRequests = 1;
        }
      })();
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5829025678144174"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 이전 Service Worker 제거
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) { registration.unregister(); });
        });
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    </script>
  </body>
</html>
