name: Daily AI Feed

# 매일 00:00 UTC = 09:00 KST 자동 실행 + 수동 트리거 가능
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      max:
        description: 'DM 최대 항목 수'
        required: false
        default: '7'
      threshold:
        description: '점수 threshold'
        required: false
        default: '5'

jobs:
  feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet anthropic google-cloud-firestore requests

      - name: Auth gcloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run daily feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/daily_feed.py \
            --max ${{ github.event.inputs.max || '7' }} \
            --threshold ${{ github.event.inputs.threshold || '5' }}
