<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}데비&마를렌 봇 관리 패널{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --debi-color: #0066ff;
            --marlene-color: #dc143c;
            --sidebar-bg: #f8f9fa;
        }
        
        .sidebar {
            background: var(--sidebar-bg);
            min-height: 100vh;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .nav-link {
            color: #495057;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover, .nav-link.active {
            background: var(--debi-color);
            color: white;
        }
        
        .status-online { color: #28a745; }
        .status-offline { color: #dc3545; }
        
        .stat-card {
            background: linear-gradient(135deg, var(--debi-color) 0%, var(--marlene-color) 100%);
            color: white;
            border: none;
            border-radius: 15px;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .logo {
            max-width: 180px;
            margin: 20px auto;
        }
        
        .content-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background: var(--debi-color);
            border-color: var(--debi-color);
        }
        
        .btn-danger {
            background: var(--marlene-color);
            border-color: var(--marlene-color);
        }
        
        .progress-bar {
            background: linear-gradient(45deg, var(--debi-color), var(--marlene-color));
        }
        
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 사이드바 -->
            <div class="col-md-2 sidebar p-0">
                <div class="text-center p-3">
                    <img src="https://raw.githubusercontent.com/2rami/debi-marlene/main/assets/debi.png" alt="데비&마를렌" class="logo img-fluid rounded-circle">
                    <h5 class="mt-2">관리 패널</h5>
                </div>
                
                <nav class="nav flex-column">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
                        <i class="fas fa-tachometer-alt me-2"></i> 대시보드
                    </a>
                    <a class="nav-link {% if request.endpoint == 'servers' %}active{% endif %}" href="{{ url_for('servers') }}">
                        <i class="fas fa-server me-2"></i> 서버 관리
                    </a>
                    <a class="nav-link {% if request.endpoint == 'announce' %}active{% endif %}" href="{{ url_for('announce') }}">
                        <i class="fas fa-bullhorn me-2"></i> 공지 전송
                    </a>
                    <a class="nav-link {% if request.endpoint == 'logs' %}active{% endif %}" href="{{ url_for('logs') }}">
                        <i class="fas fa-file-alt me-2"></i> 로그 확인
                    </a>
                </nav>
                
                <div class="mt-auto p-3">
                    <small class="text-muted">
                        <i class="fas fa-code me-1"></i>
                        데비&마를렌 봇 v1.0
                    </small>
                </div>
            </div>
            
            <!-- 메인 콘텐츠 -->
            <div class="col-md-10 p-4">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
