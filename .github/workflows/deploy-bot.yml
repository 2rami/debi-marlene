name: Deploy Bot

# 봇 코드(run/main.py 등)가 main 에 push 되면 자동 배포.
# make deploy 미러링: build -> push(Artifact Registry) -> VM 컨테이너 재시작.
# 수동 실행: Actions 탭 > Run workflow.
#
# 필요한 GitHub Secrets:
#   GCP_DEPLOY_SA_KEY - 배포 전용 SA(deploy-actions) JSON 키 전체
# 1회 셋업은 docs/deploy-github-actions.md 참고.
#
# 주의: 이 워크플로우는 프로덕션 봇을 stop -> start 한다 (start 실패 시 봇 다운).
# SA username 은 docker 그룹이 아니라 모든 docker 명령에 sudo 필수.
# /home/2rami 는 SA 홈이 아니므로 mkdir 도 sudo 필요.

on:
  push:
    branches: [main]
    paths:
      - 'run/**'
      - 'main.py'
      - 'Dockerfile'
      - 'requirements.txt'
    # 주의: 자기참조('.github/workflows/deploy-bot.yml')는 일부러 뺐다 —
    # 워크플로우 파일 수정만으로 프로덕션 봇이 stop->start 되는 사고 방지. 봇 코드 변경 시에만 자동 배포.
  workflow_dispatch:

# 동시 배포 방지 — 이전 배포가 끝나기 전 새 배포가 끼어들어 컨테이너 충돌나는 것 차단.
concurrency:
  group: deploy-bot
  cancel-in-progress: false

env:
  PROJECT_ID: ironic-objectivist-465713-a6
  VM_NAME: debi-marlene-bot
  ZONE: asia-northeast3-a
  REGION: asia-northeast3
  VM_PATH: /home/2rami/debi-marlene
  CONTAINER_NAME: debi-marlene

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Compute image tag
        run: echo "IMAGE_TAG=${REGION}-docker.pkg.dev/${PROJECT_ID}/debi-marlene/${CONTAINER_NAME}:latest" >> "$GITHUB_ENV"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # make build-local 미러링 (linux/amd64 고정 — VM 아키텍처 일치)
      - name: Build image
        run: docker build --platform linux/amd64 -t "$IMAGE_TAG" .

      # make push-image 미러링
      - name: Push image
        run: docker push "$IMAGE_TAG"

      # make restart(stop -> start) 미러링. 컨테이너는 VM 의 .env 사용 — CI 는 .env 를 만지지 않음.
      # docker 명령은 'sudo -u 2rami' 로 실행 — 2rami 만 Artifact Registry 인증(~/.docker credHelper)이 있고 docker 그룹 멤버다.
      # root(그냥 sudo)로 pull 하면 'Unauthenticated request' 로 막힌다.
      - name: Restart container on VM
        run: |
          # gcloud compute ssh + SA + OS Login 은 임시 SSH 키 전파 race 로 첫 시도가
          # 'Permission denied (publickey)' 로 튕길 수 있다(IAM 은 osAdminLogin 까지 완비됨).
          # → 각 SSH 를 재시도로 흡수. 첫 시도가 키 등록을 트리거하고 곧 전파되면 성공.
          ssh_retry() {
            for i in 1 2 3 4 5; do
              gcloud compute ssh "${VM_NAME}" --zone="${ZONE}" --quiet --command="$1" && return 0
              echo "SSH 시도 $i 실패 — 10초 후 재시도..."; sleep 10
            done
            echo "SSH 5회 모두 실패"; return 1
          }
          ssh_retry "sudo -u 2rami docker stop ${CONTAINER_NAME} 2>/dev/null || true; sudo -u 2rami docker rm ${CONTAINER_NAME} 2>/dev/null || true"
          # dangling(<none>) 이미지 정리 — 안 하면 빌드마다 누적돼 /var/lib/docker(16G) 가 차고 pull 이 'no space left on device' 로 실패한다.
          ssh_retry "sudo -u 2rami docker image prune -f"
          ssh_retry "sudo -u 2rami docker pull ${IMAGE_TAG}"
          ssh_retry "sudo -u 2rami mkdir -p /home/2rami/debi-marlene-data && sudo -u 2rami docker run -d --name ${CONTAINER_NAME} -p 5001:5001 --env-file ${VM_PATH}/.env -e BOT_DATA_DIR=/data -v /home/2rami/debi-marlene-data:/data --restart unless-stopped ${IMAGE_TAG}"

      - name: Done
        run: echo "봇 배포 완료 - $IMAGE_TAG"
